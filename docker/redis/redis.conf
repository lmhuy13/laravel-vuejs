# Redis Configuration for Laravel

# Port to listen on
port 6379

# Bind to all interfaces
bind 0.0.0.0

# TCP listen backlog size
tcp-backlog 511

# TCP keepalive (in seconds)
tcp-keepalive 300

# Daemonize off (Docker doesn't need daemonize)
daemonize no

# Supervised no
supervised no

# PID file (not needed in Docker)
# pidfile /var/run/redis.pid

# Logging level (notice, warning, verbose, debug)
loglevel notice

# Log file (empty string means stdout)
logfile ""

# Number of databases
databases 16

# ============================================================
# PERSISTENCE CONFIGURATION
# ============================================================

# Enable RDB (Snapshotting)
save 900 1
save 300 10
save 60 10000

# Stop writes if snapshot fails
stop-writes-on-bgsave-error yes

# Compress RDB file
rdbcompression yes

# Checksum RDB file
rdbchecksum yes

# RDB file name
dbfilename dump.rdb

# Directory to store RDB/AOF files
dir /data

# ============================================================
# AOF (Append Only File) PERSISTENCE
# ============================================================

# Enable AOF
appendonly yes

# AOF file name
appendfilename "appendonly.aof"

# AOF fsync policy
# - "no": Don't fsync, let the OS handle it
# - "always": Fsync after every write
# - "everysec": Fsync once per second (default)
appendfsync everysec

# Don't fsync during AOF rewrite
no-appendfsync-on-rewrite no

# Auto rewrite AOF
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF load truncated
aof-load-truncated yes

# AOF use RDB preamble
aof-use-rdb-preamble yes

# ============================================================
# MEMORY MANAGEMENT
# ============================================================

# Max memory Redis can use
maxmemory 512mb

# Memory eviction policy
# - "noeviction": Return error when reaching max memory
# - "allkeys-lru": Remove any key using LRU eviction
# - "allkeys-lfu": Remove any key using LFU eviction
# - "volatile-lru": Remove expired keys using LRU
# - "volatile-lfu": Remove expired keys using LFU
# - "volatile-ttl": Remove expired keys by TTL
# - "allkeys-random": Remove random keys
# - "volatile-random": Remove random expired keys
maxmemory-policy allkeys-lru

# LRU samples
maxmemory-samples 5

# ============================================================
# LAZY FREEING
# ============================================================

lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# ============================================================
# THREADING
# ============================================================

# Enable I/O threads (for high throughput)
# io-threads 4
# io-threads-do-reads no

# ============================================================
# CLIENT OUTPUT BUFFER LIMITS
# ============================================================

client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ============================================================
# KEYSPACE NOTIFICATIONS
# ============================================================

# Enable keyspace notifications for events
# K - Keyspace events (all commands)
# E - Event notifications
# g - generic commands
# l - list commands
# s - set commands
# h - hash commands
# z - sorted set commands
# x - stream commands
# t - stream consumer group commands
# d - string commands
# A - all commands
notify-keyspace-events ""

# ============================================================
# ADVANCED CONFIG
# ============================================================

# Hash table setting
hash-max-listpack-entries 512
hash-max-listpack-value 64

# List encoding
list-max-listpack-size -2
list-compress-depth 0

# Set encoding
set-max-intset-entries 512

# Sorted set encoding
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HyperLogLog
hll-sparse-max-bytes 3000

# Stream
stream-node-max-bytes 4096
stream-node-max-entries 100

# Replication backlog
repl-backlog-size 1mb
repl-backlog-ttl 3600

# Master replica replication
slave-read-only yes
slave-serve-stale-data yes

# Replica buffer limits
repl-disable-tcp-nodelay no
replica-priority 100

# ============================================================
# SHUTDOWN
# ============================================================

# Save on shutdown
# save ""

# ============================================================
# ACTIVE DEFRAGMENTATION
# ============================================================

# Enable active defragmentation
activedefrag no

# Minimum percentage of fragmentation to start active defrag
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10

# Maximum percentage of fragmentation before forced defrag
active-defrag-threshold-upper 100
