services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile.app
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html/laravel
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8010
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=laravel
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/laravel/vendor
    ports:
      - "8010:8000"
    depends_on:
      - postgres
      - redis
    command: bash /var/www/html/docker/setup.sh
    networks:
      - laravel

  postgres:
    image: postgres:16-alpine
    container_name: laravel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5442:5432"
    networks:
      - laravel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: laravel_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      SCRIPT_NAME: /pgadmin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - laravel
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - laravel
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  supervisor:
    build:
      context: ./docker
      dockerfile: Dockerfile.supervisor
    container_name: laravel_supervisor
    restart: unless-stopped
    working_dir: /var/www/html/laravel
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=laravel
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/laravel/vendor
    depends_on:
      - app
      - redis
      - postgres
    command: bash /var/www/html/docker/supervisor/start.sh
    networks:
      - laravel

  vite:
    container_name: laravel_vite
    restart: unless-stopped
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
      - VITE_CLIENT_HOST=localhost
      - VITE_CLIENT_PORT=5183
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5183:5173"
    networks:
      - laravel
    image: node:20-alpine
    working_dir: /app
    command: sh -lc "npm install --no-fund --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  vendor:
  node_modules:

networks:
  laravel:
    driver: bridge